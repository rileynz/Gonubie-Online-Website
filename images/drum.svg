  <!-- stencil label -->
  <text x="130" y="150" text-anchor="middle" font-family="'Courier New', monospace" font-weight="bold" font-size="15" fill="#20241c" letter-spacing="1">300&#160;KG</text>

  <text x="130" y="225" text-anchor="middle" font-family="'Courier New', monospace" font-size="9" fill="#e6dcc3" letter-spacing="2">RILEY &#183; FOOD GRADE</text>

