<svg viewBox="0 0 300 240" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of a ribboned RILEY honey gift box">
  <g transform="translate(7,10)" opacity="0.15">
    <path d="M40 90 L260 90 L260 210 L40 210 Z" fill="#293a2b"/>
  </g>
  <path d="M40 90 L260 90 L260 210 L40 210 Z" fill="#293a2b" stroke="#20241c" stroke-width="3.5" stroke-linejoin="round"/>
  <path d="M40 90 L150 70 L260 90 L150 110 Z" fill="#3a4f3c" stroke="#20241c" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- ribbon -->
  <path d="M140 70 L160 70 L166 210 L134 210 Z" fill="#c1841f" stroke="#20241c" stroke-width="2.5"/>
  <path d="M40 130 L260 130" stroke="#c1841f" stroke-width="16"/>
  <path d="M40 130 L260 130" stroke="#20241c" stroke-width="2" opacity="0.3"/>

  <!-- bow -->
  <g transform="translate(150,72)">
    <path d="M0 0 Q-38 -8 -46 18 Q-40 34 0 6 Z" fill="#a23f2b" stroke="#20241c" stroke-width="2.5"/>
    <path d="M0 0 Q38 -8 46 18 Q40 34 0 6 Z" fill="#a23f2b" stroke="#20241c" stroke-width="2.5"/>
    <circle r="8" fill="#c1841f" stroke="#20241c" stroke-width="2"/>
    <path d="M-6 6 L-16 34" stroke="#a23f2b" stroke-width="7" stroke-linecap="round"/>
    <path d="M6 6 L16 34" stroke="#a23f2b" stroke-width="7" stroke-linecap="round"/>
  </g>

  <!-- three little jar silhouettes peeking from open box -->
  <g transform="translate(70,150)">
    <rect x="0" y="0" width="26" height="34" rx="4" fill="#f1ead8" stroke="#20241c" stroke-width="2"/>
    <rect x="6" y="-8" width="14" height="10" rx="2" fill="#a23f2b" stroke="#20241c" stroke-width="2"/>
  </g>
  <g transform="translate(112,146)">
    <rect x="0" y="0" width="28" height="38" rx="4" fill="#f1ead8" stroke="#20241c" stroke-width="2"/>
    <rect x="6" y="-9" width="16" height="11" rx="2" fill="#c1841f" stroke="#20241c" stroke-width="2"/>
  </g>
  <g transform="translate(156,150)">
    <rect x="0" y="0" width="26" height="34" rx="4" fill="#f1ead8" stroke="#20241c" stroke-width="2"/>
    <rect x="6" y="-8" width="14" height="10" rx="2" fill="#20241c" stroke="#20241c" stroke-width="2"/>
  </g>
</svg>
