    <path d="M-3 165 Q60 154 123 165" stroke="#20241c" stroke-width="2.5" fill="none"/>
    <rect x="8" y="105" width="104" height="46" rx="3" fill="#f1ead8" stroke="#20241c" stroke-width="2.5"/>
    <text x="60" y="126" text-anchor="middle" font-family="Georgia, serif" font-size="13" fill="#20241c">RILEY</text>
    <text x="60" y="140" text-anchor="middle" font-family="'Courier New', monospace" font-size="7" letter-spacing="1.5" fill="#767f60">NATIVE</text>
  </g>

