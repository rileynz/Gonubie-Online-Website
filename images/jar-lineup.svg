  <g transform="translate(180,40)">
    <g transform="translate(6,10)" opacity="0.14"><path d="M14 46 L126 46 L138 70 L138 210 Q138 230 116 230 L24 230 Q2 230 2 210 L2 70 Z" fill="#293a2b"/></g>
    <path d="M22 20 Q24 6 40 6 L100 6 Q116 6 118 20 L122 46 L18 46 Z" fill="#a23f2b" stroke="#20241c" stroke-width="3.5"/>
