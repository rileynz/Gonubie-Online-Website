  </g>

  <!-- Jar 3: Mānuka (dark, high grade) -->
  <g transform="translate(350,55)">
    <g transform="translate(6,10)" opacity="0.14"><path d="M10 42 L108 42 L118 64 L118 196 Q118 214 98 214 L20 214 Q0 214 0 196 L0 64 Z" fill="#293a2b"/></g>
