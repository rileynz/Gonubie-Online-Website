<svg viewBox="0 0 480 300" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Illustration of three jars of RILEY honey — native, pōhutukawa, and mānuka">

  <!-- ===== Jar template used three times, varied colour ===== -->

  <!-- Jar 1: Native (lighter honey) -->
  <g transform="translate(20,60)">
    <g transform="translate(6,10)" opacity="0.14"><path d="M10 40 L110 40 L120 62 L120 190 Q120 208 100 208 L20 208 Q0 208 0 190 L0 62 Z" fill="#293a2b"/></g>
    <path d="M18 18 Q20 6 34 6 L86 6 Q100 6 102 18 L106 40 L14 40 Z" fill="#e6dcc3" stroke="#20241c" stroke-width="3"/>
    <path d="M10 40 L110 40 L120 62 Q123 70 123 80 L123 190 Q123 208 103 208 L17 208 Q-3 208 -3 190 L-3 80 Q-3 70 0 62 Z" fill="#f1ead8" stroke="#20241c" stroke-width="3" stroke-linejoin="round"/>
